version: '3.8'

services:
  scheduler:
    build: .
    container_name: idle-accelerator-scheduler
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      - SCHEDULER_HOST=0.0.0.0
      - SCHEDULER_PORT=8000
      - PORT=8000
    volumes:
      - ${DATA_ROOT:-./data}:/app/data
      - ${USER_DATA_ROOT:-./user_data}:/app/user_data
    restart: unless-stopped
    networks:
      - idle-network

networks:
  idle-network:
    driver: bridge
