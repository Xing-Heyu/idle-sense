version: '3.8'

services:
  scheduler:
    build: .
    container_name: idle-accelerator-scheduler
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - ./config/.env.production
    environment:
      - SCHEDULER_HOST=0.0.0.0
      - SCHEDULER_PORT=8000
    volumes:
      - idle-data:/data
      - idle-logs:/var/log/idle-sense
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  web:
    build: .
    container_name: idle-accelerator-web
    ports:
      - "${WEB_PORT:-8501}:8501"
    env_file:
      - ./config/.env.production
    environment:
      - WEB_STREAMLIT_HOST=0.0.0.0
      - WEB_STREAMLIT_PORT=8501
      - SCHEDULER_URL=http://scheduler:8000
    depends_on:
      scheduler:
        condition: service_healthy
    command: ["python", "-m", "streamlit", "run", "src/presentation/streamlit/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    volumes:
      - idle-data:/data
    restart: unless-stopped

volumes:
  idle-data:
  idle-logs:

networks:
  default:
    name: idle-network
